<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#D9903D" />
      <stop offset="100%" stop-color="#526E40" />
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- Rounded tile background -->
  <rect x="2" y="2" width="60" height="60" rx="16" fill="url(#bgGrad)" />
  
  <!-- Wheat Stalk Graphic -->
  <g filter="url(#shadow)" fill="#FFF8EF">
    <!-- Center stem -->
    <path d="M32 52 V20" stroke="#FFF8EF" stroke-width="3.5" stroke-linecap="round" />
    
    <!-- Top grain -->
    <ellipse cx="32" cy="16" rx="4" ry="6" />
    
    <!-- Left grains -->
    <ellipse cx="24" cy="24" rx="4.5" ry="6.5" transform="rotate(-30 24 24)" />
    <ellipse cx="23" cy="34" rx="4.5" ry="6.5" transform="rotate(-30 23 34)" />
    <ellipse cx="24" cy="44" rx="4.5" ry="6.5" transform="rotate(-30 24 44)" />
    
    <!-- Right grains -->
    <ellipse cx="40" cy="24" rx="4.5" ry="6.5" transform="rotate(30 40 24)" />
    <ellipse cx="41" cy="34" rx="4.5" ry="6.5" transform="rotate(30 41 34)" />
    <ellipse cx="40" cy="44" rx="4.5" ry="6.5" transform="rotate(30 40 44)" />
  </g>
</svg>